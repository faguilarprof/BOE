<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador BOE v3.2</title>

<style>
body { font-family: Arial; margin:0; padding:20px; background:#f4f4f4; }
.container { max-width:1000px; margin:auto; background:white; padding:20px; border-radius:8px; }
.search-box { display:flex; gap:10px; margin-bottom:20px; }
input { flex:1; padding:10px; font-size:16px; }
button { padding:10px 15px; cursor:pointer; }

.result-card { border:1px solid #ccc; padding:15px; margin-bottom:10px; border-left:5px solid #0056b3; }

#viewerOverlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.8);
    z-index:1000; overflow:auto;
}

#viewerContent {
    background:white; margin:20px auto; padding:30px;
    max-width:900px; border-radius:8px;
}

.closeViewer { float:right; font-size:28px; cursor:pointer; }

.legal-text { white-space:pre-wrap; line-height:1.6; }

iframe {
    width:100%;
    height:70vh;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">
<h1>🔍 Buscador BOE v3.2</h1>

<div class="search-box">
<input id="mainInput" placeholder="Ej: CE art 15">
<button onclick="performSearch()">Buscar</button>
</div>

<div id="resultsList"></div>
</div>

<div id="viewerOverlay" onclick="closeViewer(event)">
<div id="viewerContent">
<span class="closeViewer" onclick="closeViewerDirect()">×</span>
<h2>Texto</h2>

<button onclick="copyLegalText()">📋 Copiar texto cargado</button>

<div id="viewerBody" class="legal-text"></div>
</div>
</div>

<script>

const norms = [
{ alias:"CE", title:"Constitución Española", id:"BOE-A-1978-31229" },
{ alias:"LPRL", title:"Ley Prevención Riesgos Laborales", id:"BOE-A-1995-24292" }
];

function performSearch(){

    const q = document.getElementById("mainInput").value.trim();
    if(!q) return;

    const results = norms.filter(n =>
        q.toLowerCase().includes(n.alias.toLowerCase())
    );

    const container = document.getElementById("resultsList");
    container.innerHTML="";

    results.forEach(item=>{

        const div = document.createElement("div");
        div.className="result-card";

        div.innerHTML=`
        <strong>${item.title}</strong><br>
        ${item.id}<br><br>
        <button onclick="openViewer('${item.id}','${q}')">Ver texto</button>
        `;

        container.appendChild(div);
    });
}

async function openViewer(id, searchText){

    const overlay = document.getElementById('viewerOverlay');
    const body = document.getElementById('viewerBody');

    overlay.style.display="block";
    body.innerHTML="Cargando texto...";

    const apiUrl = `https://datosabiertos.boe.es/datosabiertos/api/legislacion-consolidada/id/${id}/texto.json`;
    const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(apiUrl)}`;

    try {

        const response = await fetch(proxy);
        const data = await response.json();

        let texto = "";

        function extract(node){
            if(typeof node === "string"){
                texto += node + "\n";
            } else if(Array.isArray(node)){
                node.forEach(extract);
            } else if(typeof node === "object" && node !== null){
                Object.values(node).forEach(extract);
            }
        }

        extract(data);

        texto = texto.replace(/<[^>]+>/g,"");
        texto = texto.replace(/\n\s*\n/g,"\n");

        if(texto.length < 100){
            throw "Texto insuficiente";
        }

        body.innerText = texto;

    } catch(e){

        console.warn("Fallback iframe", e);

        const url = `https://www.boe.es/buscar/act.php?id=${id}`;

        body.innerHTML = `
        <p>No se pudo cargar texto interno. Mostrando BOE oficial:</p>
        <iframe src="${url}"></iframe>
        <p style="margin-top:10px;">
        Si necesitas copiar, usa el botón "Abrir en pestaña nueva".
        </p>
        <button onclick="window.open('${url}','_blank')">Abrir en BOE</button>
        `;
    }
}

function copyLegalText(){

    const text = document.getElementById("viewerBody").innerText;

    if(!text){
        alert("No hay texto interno para copiar.");
        return;
    }

    navigator.clipboard.writeText(text);
    alert("Texto copiado");
}

function closeViewer(e){
    if(e.target.id==="viewerOverlay") closeViewerDirect();
}

function closeViewerDirect(){
    document.getElementById("viewerOverlay").style.display="none";
}

</script>

</body>
</html>
